<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Canje de Premio</title>
<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:15px;
    background:#f5f5f5;
}

h1{
    text-align:center;
    font-size:32px;
    margin-bottom:20px;
}

.card{
    background:white;
    border:1px solid #ddd;
    border-radius:18px;
    padding:20px;
    margin:auto;
    max-width:500px;
    box-sizing:border-box;
}

.titulo{
    text-align:center;
    margin:0 0 20px 0;
    font-size:36px;
    font-weight:bold;
}
    
input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

@media (max-width:600px){

    body{
        padding:10px;
    }

    h1{
        font-size:26px;
    }

    .card{
        padding:16px;
    }

    input,
    button{
        font-size:16px;
    }
}

</style>

</head>
<body>

<h1 class="titulo">
Canje de Premio <br>
🎁 Red Sport 🎁    
</h1>

<div id="contenido">
Cargando...
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyxoiVS-zmHQyJH_Dxc5wnvzYNQKSwjkNieUbbZvA3LlIwHq5UZbhuxVWLISGVekOfY_Q/exec";

let token =
new URLSearchParams(
    window.location.search
).get("token");

if(
    sessionStorage.getItem(
        "usuario"
    )
){

    if(token){

        buscar();

    }else{

        mostrarPortal();

    }

}else{

    mostrarLogin();

}

function mostrarPortal(){

    document.getElementById(
        "contenido"
    ).innerHTML =
`
        <div class="card">

            <h2>💻 Ingresar código del premio</h2>
            
            <input
                id="tokenManual"
                placeholder="Pegar token manualmente"
            >

            <button
                id="btnBuscar"
                onclick="abrirToken()"
            >
                Buscar Premio
            </button>
            
            <div
            id="reader"
            style="
                width:100%;
                margin-top:15px;
            ">
            </div>

            <p style="
                text-align:center;
                color:#666;
                margin-top:20px;
                line-height:1.6;
            ">
                🧍🏻‍♂️ ${sessionStorage.getItem("vendedor")}
                <br>
                🏪 ${sessionStorage.getItem("sucursal")}
            </p>

            <button
            onclick="logout()"
            style="
                background:#dc3545;
                margin-bottom:20px;
            ">
                🚪 Cerrar sesión
            </button>

        </div>
    `;
}

function mostrarLogin(){

    document.getElementById(
        "contenido"
    ).innerHTML =
    `
    <div class="card">

        <h2>🔐 Acceso Vendedor</h2>

        <input
            id="usuario"
            placeholder="Usuario"
        >

        <br><br>

        <div style="
            position:relative;
        ">
            <input
                id="password"
                type="password"
                placeholder="Contraseña"
                style="
                    padding-right:45px;
                "
            >

            <span
                onclick="togglePassword()"
                style="
                    position:absolute;
                    right:15px;
                    top:50%;
                    transform:translateY(-50%);
                    cursor:pointer;
                    user-select:none;
                    font-size:18px;
                "
            >
                👁️
            </span>
        </div>

        <br><br>

        <input
            id="vendedor"
            list="listaEmpleados"
            placeholder="Nombre del vendedor"
        >

        <datalist id="listaEmpleados"></datalist>

        <br><br>

        <button
            id="btnLogin"
            onclick="login()"
        >
            Ingresar
        </button>

    </div>
    `;
    cargarEmpleados();
}

async function cargarEmpleados(){

    try{

        const response =
        await fetch(API,{
            method:"POST",
            body:new URLSearchParams({
                action:"empleados"
            })
        });

        const data =
        await response.json();

        if(!data.ok) return;

        const lista =
        document.getElementById(
            "listaEmpleados"
        );

        lista.innerHTML = "";

        data.empleados.forEach(nombre=>{

            const option =
            document.createElement(
                "option"
            );

            option.value =
            nombre;

            lista.appendChild(
                option
            );

        });

    }catch(err){

        console.log(err);

    }
}
    
async function login(){

    const btn =
    document.getElementById(
        "btnLogin"
    );

    btn.disabled = true;
    btn.innerText =
    "⏳ Ingresando...";
    
    const usuario =
    document.getElementById(
        "usuario"
    ).value.trim();

    const password =
    document.getElementById(
        "password"
    ).value.trim();

    const vendedor =
    document.getElementById(
        "vendedor"
    ).value.trim();

    const opciones =
[
    ...document.querySelectorAll(
        "#listaEmpleados option"
    )
].map(
    o => o.value
);

if(
    !opciones.includes(
        vendedor
    )
){

    btn.disabled = false;
    btn.innerText =
    "Ingresar";

    alert(
        "Seleccioná un vendedor válido de la lista"
    );

    return;
}

    if(
        !usuario ||
        !password ||
        !vendedor
    ){

        btn.disabled = false;
        btn.innerText =
        "Ingresar";

        alert(
            "Completá todos los campos"
        );

        return;
    }

    const response =
    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({
            action:"login",
            usuario,
            password
        })
    });

    const data =
    await response.json();

    console.log(data);

    if(!data.login){

        btn.disabled = false;
        btn.innerText =
        "Ingresar";

        alert(
            "Usuario o contraseña incorrectos"
        );

        return;
    }

    sessionStorage.setItem(
        "usuario",
        usuario
    );

    sessionStorage.setItem(
        "sucursal",
        data.sucursal
    );

    sessionStorage.setItem(
        "vendedor",
        vendedor
    );

    if(token){

        buscar();

    }else{

        mostrarPortal();

    }
}    

function togglePassword(){

    const input =
    document.getElementById(
        "password"
    );

    if(
        input.type === "password"
    ){

        input.type = "text";

    }else{

        input.type = "password";

    }
}
    
function abrirToken(){

    const btn =
    document.getElementById(
        "btnBuscar"
    );

    btn.disabled = true;
    btn.innerText =
    "⏳ Buscando...";
    
    const tokenIngresado =
    document.getElementById(
        "tokenManual"
    ).value.trim();

    if(!tokenIngresado){

        alert(
            "Ingresá un token"
        );

        return;
    }

    token = tokenIngresado;

    buscar();
}
    
async function buscar(){

    if(
        !sessionStorage.getItem(
            "usuario"
        )
    ){
        mostrarLogin();
        return;
    }
    
    const response =
    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({
            action:"buscar_token",
            token:token
        })
    });

    const data =
    await response.json();

    console.log(data);

    if(!data.encontrado){

        document.getElementById(
            "contenido"
        ).innerHTML =
        `
        <div class="card" style="text-align:center;">
            <h2>❌ Token inválido</h2>

            <button
                onclick="mostrarPortal()"
                style="
                    background:#6c757d;
                    margin-top:20px;
                "
            >
                ← Volver
            </button>
        </div>
        `;

        return;
    }

    const sucursalLogueada =
sessionStorage.getItem(
    "sucursal"
);

if(
    data.sucursal &&
    data.sucursal !== sucursalLogueada
){

    document.getElementById(
        "contenido"
    ).innerHTML =
    `
    <div class="card"
    style="
        text-align:center;
        margin-top:80px;
    ">
        <h2>
        🚫 Sucursal incorrecta
        </h2>

        <p>
        Este premio pertenece a la sucursal:
        <b>${data.sucursal}</b>
        </p>

        <p>
        Estás logueado en:
        <b>${sucursalLogueada}</b>
        </p>

        <button
            onclick="mostrarPortal()"
            style="
                background:#6c757d;
                margin-top:20px;
            "
        >
            ← Volver
        </button>
        
    </div>
    `;

    return;
}

    if(data.estado === "CANJEADO"){

        document.getElementById(
            "contenido"
        ).innerHTML =
`
        <div class="card" style="
            text-align:center;
            margin-top:12vh;
        ">

            <h2 style="
                color:#dc3545;
                margin-top:20px;
                margin-bottom:25px;
            ">
                ⚠️ Premio ya canjeado
            </h2>

            <p style="
                font-size:16px;
                font-weight:bold;
                margin-top:12px;
            ">

            <p style="
                margin-top:25px;
                font-size:15px;
            ">
                👤 Vendedor:
                <b>${data.vendedor_canje || "-"}</b>
            </p>

            <p style="
                margin-top:10px;
                font-size:15px;
            ">
                🏪 Sucursal:
                <b>${data.sucursal_canje || "-"}</b>
            </p>

            <p style="
                font-size:16px;
                font-weight:bold;
                margin-top:8px;
            ">
                ${new Date(data.fecha_canje).toLocaleString(
                    "es-AR",
                    {
                        timeZone:"America/Argentina/Buenos_Aires",
                        day:"2-digit",
                        month:"2-digit",
                        year:"numeric",
                        hour:"2-digit",
                        minute:"2-digit",
                        second:"2-digit",
                        hour12:false
                    }
                )}
            </p>

        <button
            onclick="mostrarPortal()"
            style="
                background:#6c757d;
                margin-top:20px;
            "
        >
            ← Volver
        </button>
        
        </div>
        `;
    
        return;
    }

    document.getElementById(
        "contenido"
    ).innerHTML =
    `
    <div class="card">

        <h2>${data.premio}</h2>

        <p>
        Cliente:
        ${data.email}
        </p>

        <input
            id="email"
            type="email"
            value="${data.email}"
        >

        <button
            id="btnCanjear"
            onclick="canjear()"
        >
            Confirmar Canje
        </button>

        <button
            onclick="mostrarPortal()"
            style="
                background:#6c757d;
                margin-top:10px;
            "
        >
            ← Volver
        </button>

    </div>
    `;
}

async function canjear(){

    const btn =
    document.getElementById(
        "btnCanjear"
    );

    btn.disabled = true;
    btn.innerText =
    "⏳ Procesando...";
    
    const email =
    document.getElementById(
        "email"
    ).value.trim();

    const emailRegex =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!emailRegex.test(email)){

        btn.disabled = false;
        btn.innerText =
        "Confirmar Canje";

        alert(
            "Ingresá un email válido"
        );

        return;
    }

    const response =
    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({

            action:"canjear_token",

            token:token,

            email:email,

            vendedor:
            sessionStorage.getItem(
                "vendedor"
            ),

            sucursal:
            sessionStorage.getItem(
                "sucursal"
            )

        })
    });

    const data =
    await response.json();

    if(!data.ok){

        btn.disabled = false;
        btn.innerText =
        "Confirmar Canje";

        alert(
            data.error ||
            "Error"
        );

        return;
    }

    if(data.canjeado){

        alert(
            "Premio canjeado"
        );

        location.reload();
    }
}

function logout(){

    sessionStorage.clear();

    token = null;

    mostrarLogin();
}

</script>
    
</body>
</html>
