<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canje de Premio</title>

<style>

body{
    font-family:Arial;
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

</style>

</head>
<body>

<h1>🎁 Canje de Premio</h1>

<div id="contenido">
Cargando...
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyxoiVS-zmHQyJH_Dxc5wnvzYNQKSwjkNieUbbZvA3LlIwHq5UZbhuxVWLISGVekOfY_Q/exec";

let token =
new URLSearchParams(
    window.location.search
).get("token");

if(
    sessionStorage.getItem(
        "usuario"
    )
){

    if(token){

        buscar();

    }else{

        mostrarPortal();

    }

}else{

    mostrarLogin();

}

function mostrarPortal(){

    document.getElementById(
        "contenido"
    ).innerHTML =
`
    <h2>📷 Escaneá el QR del premio</h2>

    <p>
    Ingresá mediante el QR
    entregado al cliente.
    </p>

    <input
        id="tokenManual"
        placeholder="Pegar token manualmente"
        style="
            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:10px;
        "
    >

    <br><br>

    <button onclick="abrirToken()">
        Buscar Premio
    </button>
`;
}

function mostrarLogin(){

    document.getElementById(
        "contenido"
    ).innerHTML =
    `
    <div class="card">

        <h2>🔐 Acceso Vendedor</h2>

        <input
            id="usuario"
            placeholder="Usuario"
        >

        <br><br>

        <input
            id="password"
            type="password"
            placeholder="Contraseña"
        >

        <br><br>

        <input
            id="vendedor"
            placeholder="Nombre del vendedor"
        >

        <br><br>

        <button onclick="login()">
            Ingresar
        </button>

    </div>
    `;
}

async function login(){

    const usuario =
    document.getElementById(
        "usuario"
    ).value.trim();

    const password =
    document.getElementById(
        "password"
    ).value.trim();

    const vendedor =
    document.getElementById(
        "vendedor"
    ).value.trim();

    if(
        !usuario ||
        !password ||
        !vendedor
    ){
        alert(
            "Completá todos los campos"
        );
        return;
    }

    const response =
    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({
            action:"login",
            usuario,
            password
        })
    });

    const data =
    await response.json();

    console.log(data);

    if(!data.login){

        alert(
            "Usuario o contraseña incorrectos"
        );

        return;
    }

    sessionStorage.setItem(
        "usuario",
        usuario
    );

    sessionStorage.setItem(
        "sucursal",
        data.sucursal
    );

    sessionStorage.setItem(
        "vendedor",
        vendedor
    );

    if(token){

        buscar();

    }else{

        mostrarPortal();

    }
}    

function abrirToken(){

    const tokenIngresado =
    document.getElementById(
        "tokenManual"
    ).value.trim();

    if(!tokenIngresado){

        alert(
            "Ingresá un token"
        );

        return;
    }

    token = tokenIngresado;

    buscar();
}
    
async function buscar(){

    if(
        !sessionStorage.getItem(
            "usuario"
        )
    ){
        mostrarLogin();
        return;
    }
    
    const response =
    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({
            action:"buscar_token",
            token:token
        })
    });

    const data =
    await response.json();

    console.log(data);

    if(!data.encontrado){

        document.getElementById(
            "contenido"
        ).innerHTML =
        "<h2>❌ Token inválido</h2>";

        return;
    }

    if(data.estado === "CANJEADO"){

        document.getElementById(
            "contenido"
        ).innerHTML =
        `
        <h2>⚠️ Premio ya canjeado</h2>
        <p>
        Fecha:
        ${new Date(data.fecha_canje).toLocaleString(
            "es-AR",
            {
                timeZone: "America/Argentina/Buenos_Aires",
                day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
            }
        )}
        </p>
        `;

        return;
    }

    document.getElementById(
        "contenido"
    ).innerHTML =
    `
    <div class="card">

        <h2>${data.premio}</h2>

        <p>
        Cliente:
        ${data.email}
        </p>

        <input
            id="email"
            value="${data.email}"
        >

        <button onclick="canjear()">
            Confirmar Canje
        </button>

    </div>
    `;
}

async function canjear(){

    const email =
    document.getElementById(
        "email"
    ).value;

    await fetch(API,{
        method:"POST",
        body:new URLSearchParams({

            action:"canjear_token",

            token:token,

            email:nuevoEmail,

            vendedor:
            sessionStorage.getItem(
                "vendedor"
            ),

            sucursal:
            sessionStorage.getItem(
                "sucursal"
            )

        })
    });

    const data =
    await response.json();

    if(data.canjeado){

        alert(
            "Premio canjeado"
        );

        location.reload();
    }
}

</script>

</body>
</html>
